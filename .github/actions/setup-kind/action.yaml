name: Setup KinD cluster
description: Create a KinD cluster with local registry and prepare for deployment

inputs:
  namespace:
    description: Kubernetes namespace to deploy into
    required: true
  working_dir:
    description: Directory containing the quickstart code
    required: false
    default: ./quickstart
  kind_version:
    description: KinD version to install
    required: false
    default: v0.30.0
  pre_deploy_command:
    description: Command to run before deploy (e.g. helm dependency build)
    required: false
    default: ''
  build_images:
    description: Build and push images to the local KinD registry
    required: false
    default: 'false'
  build_images_command:
    description: Command to build images
    required: false
    default: 'make build-all-images'
  push_images_command:
    description: Command to push images to local registry
    required: false
    default: 'make push-all-images'

runs:
  using: composite
  steps:
    - name: Install Kind
      shell: bash
      env:
        KIND_VERSION: ${{ inputs.kind_version }}
      run: go install "sigs.k8s.io/kind@${KIND_VERSION}"

    - name: Create Kind Cluster with local registry
      run: bash ${GITHUB_ACTION_PATH}/../../../scripts/ci/kind-with-registry.sh
      shell: bash

    - name: Pre-deploy setup
      if: inputs.pre_deploy_command != ''
      working-directory: ${{ inputs.working_dir }}
      shell: bash
      env:
        PRE_DEPLOY_COMMAND: ${{ inputs.pre_deploy_command }}
        NAMESPACE: ${{ inputs.namespace }}
      run: eval "$PRE_DEPLOY_COMMAND"

    - name: Build images
      if: inputs.build_images == 'true'
      working-directory: ${{ inputs.working_dir }}
      shell: bash
      env:
        BUILD_COMMAND: ${{ inputs.build_images_command }}
        REGISTRY: localhost:5001
      run: eval "$BUILD_COMMAND"

    - name: Push images to local registry
      if: inputs.build_images == 'true'
      working-directory: ${{ inputs.working_dir }}
      shell: bash
      env:
        PUSH_COMMAND: ${{ inputs.push_images_command }}
        REGISTRY: localhost:5001
        PUSH_EXTRA_AGRS: "--tls-verify=false"
      run: eval "$PUSH_COMMAND"

    - name: Create namespace
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
      run: kubectl create namespace "$NAMESPACE" || true
