name: Run Tests
description: Run tests via a configurable command

inputs:
  test_command:
    description: Command to run tests (e.g. "make test-all" or "pytest tests/ -v")
    required: true
  working_dir:
    description: Directory to run tests in
    required: false
    default: ./quickstart

runs:
  using: composite
  steps:
    - name: Run tests
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      env:
        TEST_COMMAND: ${{ inputs.test_command }}
      run: |
        eval "$TEST_COMMAND"
