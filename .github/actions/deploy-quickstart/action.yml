name: Deploy Quickstart to OpenShift
description: Deploy a quickstart to an OpenShift cluster using oc login and a configurable deploy command

inputs:
  deploy_command:
    description: Shell command to deploy (e.g. "make helm-install-test")
    required: true
  working_dir:
    description: Directory to run commands in
    required: false
    default: ./quickstart
  namespace:
    description: OpenShift namespace/project to deploy into
    required: false
    default: quickstart-ci-project-1
  setup_commands:
    description: Pre-deploy setup commands (newline-separated)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Log into OpenShift cluster
      shell: bash
      run: |
        oc login --token="$PROD_TOKEN" --server="$PROD_SERVER"

    - name: Run setup commands
      if: inputs.setup_commands != ''
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      env:
        SETUP_COMMANDS: ${{ inputs.setup_commands }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        eval "$SETUP_COMMANDS"

    - name: Deploy quickstart
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      env:
        DEPLOY_COMMAND: ${{ inputs.deploy_command }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        eval "$DEPLOY_COMMAND"

    - name: Verify deployment
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        echo "=== Pod Status ==="
        oc get pods -n "$NAMESPACE"
