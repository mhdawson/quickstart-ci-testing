name: Initialize KinD cluster and deploy application
description: Create a KinD cluster with local registry and deploy via helm

inputs:
  namespace:
    description: Kubernetes namespace to deploy into
    required: false
    default: quickstart-ci-project-1
  working_dir:
    description: Directory containing the quickstart code
    required: false
    default: ./quickstart
  kind_version:
    description: KinD version to install
    required: false
    default: v0.30.0
  pre_deploy_command:
    description: Command to run before deploy (e.g. helm dependency build)
    required: false
    default: ''
  deploy_command:
    description: Command to deploy the application
    required: true
  extra_deploy_args:
    description: Additional arguments appended to deploy_command
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install Kind
      shell: bash
      env:
        KIND_VERSION: ${{ inputs.kind_version }}
      run: go install "sigs.k8s.io/kind@${KIND_VERSION}"

    - name: Create Kind Cluster with local registry
      run: bash ${GITHUB_ACTION_PATH}/../../../scripts/ci/kind-with-registry.sh
      shell: bash

    - name: Pre-deploy setup
      if: inputs.pre_deploy_command != ''
      working-directory: ${{ inputs.working_dir }}
      shell: bash
      env:
        PRE_DEPLOY_COMMAND: ${{ inputs.pre_deploy_command }}
        NAMESPACE: ${{ inputs.namespace }}
      run: eval "$PRE_DEPLOY_COMMAND"

    - name: Create namespace
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
      run: kubectl create namespace "$NAMESPACE" || true

    - name: Deploy application
      working-directory: ${{ inputs.working_dir }}
      shell: bash
      env:
        DEPLOY_COMMAND: ${{ inputs.deploy_command }}
        EXTRA_DEPLOY_ARGS: ${{ inputs.extra_deploy_args }}
        NAMESPACE: ${{ inputs.namespace }}
      run: eval "$DEPLOY_COMMAND" $EXTRA_DEPLOY_ARGS
