name: Test - Speeding Up Ticket Resolution

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Saturday 8pm ET (EDT UTC-4, midnight UTC Sunday)

concurrency:
  group: quickstart-ci-tests
  cancel-in-progress: false

jobs:
  test:
    name: speeding-up-ticket-resolution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-and-deploy
        timeout-minutes: 15
        with:
          repo_url: https://github.com/rh-ai-quickstart/speeding-up-ticket-resolution
          ref: dev
          submodules: 'true'
          deploy_command: "make install"
        env:
          PROD_TOKEN: ${{ secrets.PROD_TOKEN }}
          PROD_SERVER: ${{ secrets.PROD_SERVER }}
          LLM: ${{ vars.LLM_INFERENCE_SCOUT }}
          LLM_ID: ${{ vars.LLM_ID_INFERENCE_SCOUT }}
          LLM_URL: ${{ vars.LLM_URL_INFERENCE_SCOUT }}
          LLM_API_TOKEN: ${{ secrets.LLM_API_TOKEN_INFERENCE_SCOUT }}
          LG_PROMPT_TICKET_LAPTOP_REFRESH: /app/agent-service/config/lg-prompts/ticket-laptop-refresh-lg-prompt-small-scout.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.9"
          python-version: "3.12"

      - uses: ./.github/actions/run-quickstart-tests
        timeout-minutes: 30
        with:
          test_command: "make test-short-ticket-laptop-refresh"
          upload_results: "it-self-service-agent/evaluations/results"
        env:
          LLM: ${{ vars.LLM_INFERENCE }}
          LLM_ID: ${{ vars.LLM_ID_INFERENCE }}
          LLM_URL: ${{ vars.LLM_URL_INFERENCE }}
          LLM_API_TOKEN: ${{ secrets.LLM_API_TOKEN_INFERENCE }}

      - uses: ./.github/actions/cleanup
        if: always()
        with:
          cleanup_command: "make uninstall"
