name: Test - RAG

on:
  workflow_dispatch:

concurrency:
  group: quickstart-ci-tests
  cancel-in-progress: false

jobs:
  test:
    name: RAG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-and-deploy
        with:
          repo_url: https://github.com/rh-ai-quickstart/RAG
          deploy_command: "helm install rag deploy/helm/rag --namespace $NAMESPACE"
          setup_commands: |
            helm repo add rag-charts https://rh-ai-quickstart.github.io/ai-architecture-charts
            helm repo update
            cd deploy/helm/rag && helm dependency build
        env:
          PROD_TOKEN: ${{ secrets.PROD_TOKEN }}
          PROD_SERVER: ${{ secrets.PROD_SERVER }}
          MAAS_API_KEY: ${{ secrets.LLM_API_TOKEN_INFERENCE }}
          MAAS_ENDPOINT: ${{ vars.LLM_URL_INFERENCE }}
          MAAS_MODEL_ID: ${{ vars.LLM_ID_INFERENCE }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        shell: bash
        working-directory: ./quickstart
        run: |
          pip install -r tests/e2e_ui/requirements.txt
          playwright install chromium

      - name: Wait for deployments to be ready
        run: |
          oc wait --for=condition=available --timeout=600s deployment/llamastack -n quickstart-ci-project-1
          oc wait --for=condition=available --timeout=300s deployment/rag -n quickstart-ci-project-1
          oc wait --for=condition=ready --timeout=600s pod -l app.kubernetes.io/name=llamastack -n quickstart-ci-project-1
          oc wait --for=condition=ready --timeout=300s pod -l app.kubernetes.io/name=rag -n quickstart-ci-project-1

      - name: Wait for ingestion pipelines to complete
        run: |
          TIMEOUT=600
          ELAPSED=0
          STABLE_COUNT=0
          LAST_TOTAL=0
          echo "Waiting for ingestion pipelines to complete..."
          while [ $ELAPSED -lt $TIMEOUT ]; do
            PENDING=$(oc get pods -n quickstart-ci-project-1 --no-headers 2>/dev/null \
              | grep -E "fetch-and-store-pipeline|add-.*-pipeline" \
              | grep -v -E "Completed|Succeeded" \
              | wc -l)
            TOTAL=$(oc get pods -n quickstart-ci-project-1 --no-headers 2>/dev/null \
              | grep -E "fetch-and-store-pipeline|add-.*-pipeline" \
              | wc -l)
            if [ "$PENDING" -eq 0 ] && [ "$TOTAL" -eq "$LAST_TOTAL" ]; then
              STABLE_COUNT=$((STABLE_COUNT + 1))
            else
              STABLE_COUNT=0
            fi
            LAST_TOTAL=$TOTAL
            if [ "$PENDING" -eq 0 ] && [ "$TOTAL" -gt 0 ] && [ "$STABLE_COUNT" -ge 2 ]; then
              echo "All $TOTAL pipeline pods completed (stable for 30s)"
              echo "=== Pod Status ==="
              oc get pods -n quickstart-ci-project-1
              break
            fi
            echo "Waiting... (pending=$PENDING total=$TOTAL stable=$STABLE_COUNT, ${ELAPSED}s elapsed)"
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "Warning: Timed out waiting for pipelines after ${TIMEOUT}s"
            oc get pods -n quickstart-ci-project-1
          fi

      - name: Port forward services
        run: |
          oc port-forward -n quickstart-ci-project-1 svc/llamastack 8321:8321 &
          oc port-forward -n quickstart-ci-project-1 svc/rag 8501:8501 &
          sleep 5

      - uses: ./.github/actions/run-quickstart-tests
        with:
          test_command: "pytest tests/e2e_ui/ -v --browser chromium"
        env:
          LLAMA_STACK_ENDPOINT: http://localhost:8321
          RAG_UI_ENDPOINT: http://localhost:8501
          MAAS_API_KEY: ${{ secrets.LLM_API_TOKEN_INFERENCE }}
          MAAS_ENDPOINT: ${{ vars.LLM_URL_INFERENCE }}
          MAAS_MODEL_ID: ${{ vars.LLM_ID_INFERENCE }}

      - uses: ./.github/actions/cleanup
        if: always()
        with:
          cleanup_command: "helm uninstall rag --namespace $NAMESPACE"
