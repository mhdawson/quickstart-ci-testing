name: Test - Lemonade Stand Assistant (Default Model)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 0'  # Saturday 9pm ET (EDT UTC-4, 01:00 UTC Sunday)

concurrency:
  group: quickstart-ci-tests
  cancel-in-progress: false

jobs:
  test:
    name: lemonade-stand-assistant-default
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-and-deploy
        timeout-minutes: 15
        with:
          repo_url: https://github.com/rh-ai-quickstart/lemonade-stand-assistant
          setup_commands: |
            python3 -c "
            f = './chart/templates/llm-llama32.yaml'
            txt = open(f).read()
            old = '    tolerations:\n      - effect: NoSchedule\n        key: nvidia.com/gpu\n        operator: Exists'
            new = '    tolerations:\n      - effect: NoSchedule\n        key: g5-gpu\n        operator: Exists\n      - effect: NoSchedule\n        key: nvidia.com/gpu\n        operator: Exists'
            open(f, 'w').write(txt.replace(old, new))
            "
            # Our cluster runs KServe in headed mode, where predictor Services expose port 80
            # (the Service maps 80 -> the container's native port internally). The quickstart
            # chart was written for headless mode and hardcodes ports 8000/8080 for the
            # guardrails detectors and LLM predictor respectively. Patch them to port 80.
            sed -i 's/port: 8000/port: 80/g' ./chart/templates/fms-orchestr8-config-nlp.yaml
            sed -i 's/| default "8080"/| default "80"/' ./chart/templates/fms-orchestr8-config-nlp.yaml
          deploy_command: >-
            helm install lemonade-stand-assistant ./chart --namespace "$NAMESPACE"
        env:
          PROD_TOKEN: ${{ secrets.PROD_TOKEN }}
          PROD_SERVER: ${{ secrets.PROD_SERVER }}

      - name: Wait for deployment
        env:
          NAMESPACE: quickstart-ci-project-1
        run: |
          oc wait --for=condition=Available deployment --all -n "$NAMESPACE" --timeout=20m
          oc get pods -n "$NAMESPACE"

          ROUTE=$(oc get route lemonade-stand -n "$NAMESPACE" -o jsonpath='{.spec.host}')
          echo "Waiting for UI at https://${ROUTE}..."
          for i in $(seq 1 12); do
            if curl -sf --max-time 5 "https://${ROUTE}" -o /dev/null; then
              echo "UI is available"
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "UI did not become available within 60s"
              exit 1
            fi
            echo "Attempt $i/12 failed, retrying in 5s..."
            sleep 5
          done

      - name: Test lemonade stand assistant
        env:
          NAMESPACE: quickstart-ci-project-1
          EXPECTED_MSG: "🍏 I can only discuss lemons! Other fruits and off-topic subjects are not allowed. Is there anything else I can help you with?"
        run: |
          set -o pipefail
          ROUTE=$(oc get route lemonade-stand -n "$NAMESPACE" -o jsonpath='{.spec.host}')
          echo "Testing https://${ROUTE}/api/chat"

          QUESTION="tell me about oranges"
          echo "Q: $QUESTION"

          curl -sf --max-time 30 -X POST "https://${ROUTE}/api/chat" \
            -H "Content-Type: application/json" \
            -d "{\"message\": \"$QUESTION\"}" | tee /tmp/lemonade_response.txt

          python3 - << 'PYEOF'
          import sys, json, os
          with open('/tmp/lemonade_response.txt') as f:
              response = f.read()
          expected = os.environ['EXPECTED_MSG']
          for line in response.splitlines():
              line = line.strip()
              if not line.startswith('data:'):
                  continue
              event = json.loads(line[5:].strip())
              if event.get('type') == 'error' and event.get('detector_type') == 'regex':
                  print('A: ' + event.get('message', ''))
                  if event.get('message') == expected:
                      print('PASS: got expected refusal message')
                      sys.exit(0)
                  print('FAIL: wrong message: ' + repr(event.get('message')))
                  sys.exit(1)
          print('FAIL: no regex error event in response')
          sys.exit(1)
          PYEOF

      - uses: ./.github/actions/cleanup
        if: always()
        with:
          cleanup_command: "helm uninstall lemonade-stand-assistant --namespace $NAMESPACE"
