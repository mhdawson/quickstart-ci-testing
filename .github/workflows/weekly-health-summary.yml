name: Weekly Health Summary

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'  # Monday 1am ET (EDT UTC-4)

permissions:
  actions: read

jobs:
  summary:
    name: health-summary
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"

          echo "# Quickstart CI Health Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quickstart | Result | Started | Duration |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          # Discover all workflows whose filename starts with test-, sorted by name
          WORKFLOW_DATA=$(gh api "repos/$REPO/actions/workflows" \
            --jq '[.workflows[] | select(.path | split("/")[-1] | startswith("test-"))] | sort_by(.name) | .[] | "\(.id)|\(.name)"')

          CUTOFF=$(date -d "7 days ago" +%s)

          while IFS= read -r ENTRY; do
            WF_ID="${ENTRY%%|*}"
            NAME="${ENTRY##*|}"

            DATA=$(gh api "repos/$REPO/actions/workflows/$WF_ID/runs?per_page=1" \
              --jq '.workflow_runs[0] | {conclusion: .conclusion, startedAt: .run_started_at, updatedAt: .updated_at, url: .html_url}' 2>/dev/null)

            STARTED=$(echo "$DATA" | jq -r '.startedAt // ""')

            # Skip workflows with no recent run
            [ -z "$STARTED" ] && continue
            [ "$(date -d "$STARTED" +%s)" -lt "$CUTOFF" ] && continue

            CONCLUSION=$(echo "$DATA" | jq -r '.conclusion // "unknown"')
            ENDED=$(echo "$DATA"      | jq -r '.updatedAt // ""')
            URL=$(echo "$DATA"        | jq -r '.url // ""')

            case "$CONCLUSION" in
              success)   ICON="✅ pass" ;;
              failure)   ICON="❌ fail" ;;
              cancelled) ICON="⚠️ cancelled" ;;
              *)         ICON="❓ $CONCLUSION" ;;
            esac

            S=$(date -d "$STARTED" +%s)
            E=$(date -d "$ENDED"   +%s)
            DURATION="$(( (E - S) / 60 ))m"

            echo "| [$NAME]($URL) | $ICON | $STARTED | $DURATION |" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$WORKFLOW_DATA"
