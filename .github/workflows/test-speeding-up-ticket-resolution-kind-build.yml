name: Test - Speeding Up Ticket Resolution (KinD + Build)

on:
  workflow_dispatch:

concurrency:
  group: quickstart-ci-tests
  cancel-in-progress: false

jobs:
  test:
    name: speeding-up-ticket-resolution-kind-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.9"
          python-version: "3.12"

      - uses: ./.github/actions/setup-and-deploy
        timeout-minutes: 15
        with:
          repo_url: https://github.com/rh-ai-quickstart/speeding-up-ticket-resolution
          ref: dev
          submodules: 'true'
          use_kind: 'true'
          build_images: 'true'
          deploy_command: "make install"
          kind_extra_deploy_args: >-
            EXTRA_HELM_ARGS="--set requestManagement.networkPolicies.platform=kind
            --set requestManagement.requestManager.externalAccess.enabled=false
            --set requestManagement.integrationDispatcher.externalAccess.enabled=false
            --set ticketingZammad.externalRoute.enabled=false"
#            --set requestManagement.requestManager.uvicornWorkers=2
#            --set requestManagement.integrationDispatcher.uvicornWorkers=2
#            --set requestManagement.agentService.uvicornWorkers=2
#            --set requestManagement.knative.mockEventing.uvicornWorkers=2
        env:
          LLM: ${{ vars.LLM_INFERENCE }}
          LLM_ID: ${{ vars.LLM_ID_INFERENCE }}
          LLM_URL: ${{ vars.LLM_URL_INFERENCE }}
          LLM_API_TOKEN: ${{ secrets.LLM_API_TOKEN_INFERENCE }}
          ZAMMAD_DEMO_SITE_ENABLED: "false"
          REPLICA_COUNT: "2"

#     - name: Wait for terminating pods to finish
#        run: |
#          TIMEOUT=240
#          ELAPSED=0
#          while [ $ELAPSED -lt $TIMEOUT ]; do
#            TERMINATING=$(oc get pods -n quickstart-ci-project-1 --no-headers 2>/dev/null \
#              | grep -c "Terminating" || true)
#            if [ "$TERMINATING" -eq 0 ]; then
#              echo "No terminating pods remaining"
#              oc get pods -n quickstart-ci-project-1
#              break
#            fi
#            echo "Waiting for $TERMINATING terminating pod(s)... (${ELAPSED}s elapsed)"
#            sleep 5
#            ELAPSED=$((ELAPSED + 5))
#          done
#          if [ $ELAPSED -ge $TIMEOUT ]; then
#            echo "Warning: Timed out waiting for terminating pods after ${TIMEOUT}s"
#            oc get pods -n quickstart-ci-project-1
#          fi

      - uses: ./.github/actions/run-quickstart-tests
        timeout-minutes: 30
        with:
          test_command: "make test-short-ticket-laptop-refresh"
          upload_results: "it-self-service-agent/evaluations/results"
        env:
          LLM: ${{ vars.LLM_INFERENCE }}
          LLM_ID: ${{ vars.LLM_ID_INFERENCE }}
          LLM_URL: ${{ vars.LLM_URL_INFERENCE }}
          LLM_API_TOKEN: ${{ secrets.LLM_API_TOKEN_INFERENCE }}
          TRIGGER_POLL_TIMEOUT: "180"

      - uses: ./.github/actions/cleanup
        if: always()
        with:
          cleanup_command: "make uninstall"
